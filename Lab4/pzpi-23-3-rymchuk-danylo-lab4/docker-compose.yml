version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: hobbyrent-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - server1
    networks:
      - hobbyrent-network

  server1:
    build: .
    container_name: hobbyrent-server-1
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - postgres
    networks:
      - hobbyrent-network

  server2:
     build: .
     container_name: hobbyrent-server-2
     environment:
       - SPRING_PROFILES_ACTIVE=docker
     depends_on:
       - postgres
     networks:
       - hobbyrent-network

  server3:
     build: .
     container_name: hobbyrent-server-3
     environment:
       - SPRING_PROFILES_ACTIVE=docker
     depends_on:
       - postgres
     networks:
       - hobbyrent-network

  postgres:
    image: postgres:15-alpine
    container_name: hobbyrent-postgres
    environment:
      - POSTGRES_DB=hobbyrent_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=novyi_parol_123
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - hobbyrent-network

volumes:
  postgres-data:

networks:
  hobbyrent-network:
    driver: bridge