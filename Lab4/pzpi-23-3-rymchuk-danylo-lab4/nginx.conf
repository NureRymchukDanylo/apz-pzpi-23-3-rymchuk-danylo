events {
    worker_connections 1024;
}

http {
    upstream backend_servers {
        # Спочатку залишаємо тільки 1 сервер для першого тесту
        server server1:8080;
        server server2:8080;
        server server3:8080;
    }

    server {
        listen 80;
        location / {
            proxy_pass http://backend_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}